<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 120" role="img" aria-label="Common Ladder">
  <!--
    Common Ladder — Reverse logo (dark backgrounds)
    Same construction as logo-primary.svg but inverted for dark:
      - Background plate: Ladder Blue (#1C3D6E)
      - Bottom hex: WHITE (replaces Ladder Blue, which would vanish on dark)
      - Middle/Top hexes: Sage and Amber, unchanged
      - Wordmark "common": WHITE; "ladder": Rung Amber (unchanged)
    Two-color split preserved so the brand signature carries between variants.
  -->
  <title>Common Ladder (reverse / dark background)</title>

  <!-- Background plate — Ladder Blue -->
  <rect width="560" height="120" fill="#1C3D6E"/>

  <!-- Mark: three rising hexagons -->
  <g id="cl-mark-reverse" transform="translate(20 20)">
    <polygon points="0,60 18,72 36,60 36,36 18,24 0,36" fill="#FFFFFF"/>
    <polygon points="28,48 46,60 64,48 64,24 46,12 28,24" fill="#4A9E82"/>
    <polygon points="56,36 74,48 92,36 92,12 74,0 56,12" fill="#E8911A"/>
  </g>

  <!-- Wordmark -->
  <text x="135" y="78"
        font-family="Manrope, 'Manrope Variable', system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-weight="700"
        font-size="44"
        letter-spacing="-0.8"
        textLength="410"
        lengthAdjust="spacingAndGlyphs">
    <tspan fill="#FFFFFF">common</tspan><tspan fill="#E8911A">ladder</tspan>
  </text>
</svg>
