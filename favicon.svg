<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!--
    Common Ladder favicon — civic-grid mark on Ladder Blue rounded square.
    Three rising hexagons (white / sage / amber) sized to fill a 32×32 tile.
    Matches /brand-assets/icon-mark-reverse.svg.
  -->
  <rect width="32" height="32" rx="6" fill="#1C3D6E"/>
  <svg x="2" y="4" width="28" height="24" viewBox="0 0 120 96" preserveAspectRatio="xMidYMid meet">
    <g transform="translate(14 12)">
      <polygon points="0,60 18,72 36,60 36,36 18,24 0,36" fill="white" opacity=".94"/>
      <polygon points="28,48 46,60 64,48 64,24 46,12 28,24" fill="#4A9E82"/>
      <polygon points="56,36 74,48 92,36 92,12 74,0 56,12" fill="#E8911A"/>
    </g>
  </svg>
</svg>
