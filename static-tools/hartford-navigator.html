<head>

<title>Hartford Homelessness Resource Navigator — Common Ladder</title>
<meta name="description" content="Find shelter, food, health care, and housing programs in Greater Hartford. Free, no signup.">
<link rel="canonical" href="https://www.commonladder.org/static-tools/hartford-navigator.html">
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Navigator palette — slightly different from main site for tool readability */
    --bg:        #FAF7F2;
    --primary:   #1A5276;
    --accent:    #2E86AB;
    --text:      #1C2B33;
    --green:     #27AE60;
    --green-dark:#1E8449;
    --muted:     #6B7C85;
    --border:    #D5D0C8;
    --card-bg:   #FFFFFF;
    --shadow:    0 2px 12px rgba(26,82,118,0.10);

    /* Common Ladder brand — used for home badge only */
    --cl-blue:   #1C3D6E;
    --cl-amber:  #E8911A;
  }

  html { font-size: 18px; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Layout shell ── */
  #app {
    width: 100%;
    max-width: 640px;
    padding: 24px 20px 60px;
    flex: 1;
  }

  /* ── County badge (top of app, always visible) ── */
  .county-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--primary);
    color: #fff;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 100px;
    margin-bottom: 28px;
  }
  .county-badge svg { flex-shrink: 0; }

  /* ── Question card ── */
  .card {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 32px 28px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }

  .q-label {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .q-text {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--primary);
    line-height: 1.35;
    margin-bottom: 8px;
  }

  .q-sub {
    font-size: 0.88rem;
    color: var(--muted);
    margin-bottom: 28px;
  }

  /* ── Buttons ── */
  .btn-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .btn {
    flex: 1;
    min-width: 120px;
    padding: 14px 20px;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.98); }

  .btn-yes  { background: var(--primary); color: #fff; }
  .btn-yes:hover  { background: #154360; }
  .btn-no   { background: #EBF5FB; color: var(--primary); }
  .btn-no:hover   { background: #D6EAF8; }

  .btn-primary {
    display: inline-block;
    background: var(--green);
    color: #fff;
    padding: 16px 28px;
    border-radius: 10px;
    font-size: 1.05rem;
    font-weight: 700;
    text-decoration: none;
    text-align: center;
    margin-top: 8px;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--green-dark); }

  .btn-restart {
    background: none;
    border: 1.5px solid var(--border);
    color: var(--muted);
    font-size: 0.85rem;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 12px;
    transition: border-color 0.15s;
  }
  .btn-restart:hover { border-color: var(--primary); color: var(--primary); }

  /* ── Progress bar ── */
  .progress-wrap {
    margin-bottom: 20px;
  }
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.35s ease;
  }
  .progress-label {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 5px;
  }

  /* ── Result card ── */
  .result-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 0.78rem;
    font-weight: 700;
    margin-bottom: 18px;
  }
  .badge-veterans { background: #D5E8D4; color: #27AE60; }
  .badge-youth    { background: #D5E8D4; color: #27AE60; }
  .badge-families { background: #DAE8FC; color: #1A5276; }
  .badge-chronic  { background: #FFF2CC; color: #856404; }
  .badge-adult    { background: #E8DAEF; color: #6C3483; }

  .result-headline {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--primary);
    line-height: 1.35;
    margin-bottom: 20px;
  }

  .first-action {
    background: #EBF5FB;
    border-left: 4px solid var(--accent);
    border-radius: 0 10px 10px 0;
    padding: 16px 18px;
    font-size: 0.95rem;
    margin-bottom: 20px;
  }

  .section-head {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 22px 0 10px;
  }

  .what-to-expect {
    font-size: 0.93rem;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 4px;
  }

  /* ── Bring list ── */
  .bring-list {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .bring-list li {
    display: flex;
    gap: 8px;
    font-size: 0.9rem;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  .bring-list li:last-child { border-bottom: none; }
  .bring-list li::before { content: "✓"; color: var(--green); font-weight: 700; flex-shrink: 0; }

  /* ── Resource cards ── */
  .resource-card {
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .resource-card__name {
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--primary);
    margin-bottom: 2px;
  }
  .resource-card__phone {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--green-dark);
    text-decoration: none;
    display: inline-block;
    margin-bottom: 3px;
  }
  .resource-card__note {
    font-size: 0.82rem;
    color: var(--muted);
  }

  /* ── Extra note ── */
  .extra-note {
    background: #FFFDE7;
    border: 1px solid #FDD835;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 0.88rem;
    color: #5D4037;
    margin-top: 16px;
  }

  /* ── Confidence badge ── */
  .conf-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 100px;
    margin-top: 20px;
    cursor: help;
    position: relative;
  }
  .conf-verified   { background: #D5E8D4; color: #27AE60; }
  .conf-research   { background: #DAE8FC; color: #1A5276; }
  .conf-unverified { background: #FFE6CC; color: #D6760C; }
  .conf-tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: #1C2B33;
    color: #fff;
    font-size: 0.75rem;
    font-weight: 400;
    line-height: 1.5;
    padding: 10px 14px;
    border-radius: 8px;
    width: 260px;
    z-index: 10;
    pointer-events: none;
  }
  .conf-tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: #1C2B33;
  }
  .conf-badge:hover .conf-tooltip,
  .conf-badge.open  .conf-tooltip { display: block; }

  /* ── Welcome screen ── */
  .welcome-title {
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--primary);
    line-height: 1.25;
    margin-bottom: 12px;
  }
  .welcome-sub {
    font-size: 1rem;
    color: var(--muted);
    margin-bottom: 28px;
  }
  .welcome-start {
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 18px 32px;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    transition: background 0.15s;
  }
  .welcome-start:hover { background: #154360; }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 20px 20px 32px;
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.8;
    max-width: 640px;
    width: 100%;
  }
  footer a { color: var(--muted); }
  footer a:hover { color: var(--primary); }
  .footer-divider { margin: 0 8px; opacity: 0.5; }

  /* ── Common Ladder home badge (fixed top-right) ── */
  .cl-home {
    position: fixed;
    top: 14px;
    right: 16px;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--cl-blue);
    color: #fff;
    text-decoration: none;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.01em;
    padding: 7px 13px 7px 9px;
    border-radius: 100px;
    box-shadow: 0 2px 10px rgba(28,61,110,0.25);
    z-index: 999;
    transition: background 0.15s;
  }
  .cl-home:hover { background: #163260; }
  .cl-home__rung { color: var(--cl-amber); }

  /* ── Print styles ── */
  @media print {
    .btn-restart, .progress-wrap, footer .share-note { display: none; }
    .cl-home { display: none; }
  }

  /* ── Mobile ── */
  @media (max-width: 480px) {
    html { font-size: 16px; }
    .card { padding: 24px 18px; }
    .cl-home span { display: none; } /* icon only on small screens */
    .cl-home { padding: 8px 10px; }
    .conf-tooltip { width: 200px; left: 0; transform: none; }
    .conf-tooltip::after { left: 24px; transform: none; }
  }
</style>
</head>

  function render() {
    var app = document.getElementById('app');
    var html = '';

    // County badge always shown at top
    html += '<div class="county-badge">';
    html += '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>';
    // [REPLACE: Update county/CoC name and ID in the text below]
    html += 'Hartford, CT &mdash; CT-503</div>';

    if (state.step === 'welcome') {
      html += renderWelcome();
    } else if (state.step.startsWith('result_')) {
      html += renderResult(state.step);
    } else {
      html += renderQuestion(state.step);
    }

    app.innerHTML = html;
  }

  function renderWelcome() {
    return '<div class="card">' +
      '<div class="welcome-title">Find the right help.<br>Answer 4 quick questions.</div>' +
      '<div class="welcome-sub">We\'ll match you to the services and programs most likely to help — based on your situation, not a generic list.</div>' +
      '<button class="welcome-start" onclick="goTo(\'q1\')">Get started &rarr;</button>' +
      '</div>' +
      '<div style="font-size:0.8rem; color:var(--muted); text-align:center; margin-top:12px;">No personal information collected. Free to use.</div>';
  }

  function renderQuestion(qid) {
    var q = QUESTIONS[Q_INDEX[qid]];
    var stepNum = Q_INDEX[qid] + 1;
    var pct = Math.round((stepNum / QUESTIONS.length) * 100);
    var html = '';

    html += '<div class="progress-wrap">' +
      '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
      '<div class="progress-label">Question ' + stepNum + ' of ' + QUESTIONS.length + '</div>' +
      '</div>';

    html += '<div class="card">' +
      '<div class="q-label">Question ' + stepNum + '</div>' +
      '<div class="q-text">' + q.text + '</div>' +
      '<div class="q-sub">' + q.sub + '</div>' +
      '<div class="btn-row">' +
      '<button class="btn btn-yes" onclick="answer(true)">' + (q.yes_label || 'Yes') + '</button>' +
      '<button class="btn btn-no"  onclick="answer(false)">' + (q.no_label  || 'No')  + '</button>' +
      '</div>' +
      '</div>';

    if (Q_INDEX[qid] > 0) {
      html += '<button class="btn-restart" onclick="history.back()">← Back</button>';
    }

    return html;
  }

  function renderConfidenceBadge(conf) {
    var meta = CONFIDENCE_META[conf.level];
    return '<span class="conf-badge ' + meta.cssClass + '" onclick="this.classList.toggle(\'open\')" tabindex="0" role="button" aria-label="Information confidence: ' + meta.label + '">' +
      meta.icon + ' ' + meta.label +
      ' &mdash; Last checked: ' + conf.lastChecked +
      '<span class="conf-tooltip">' + meta.tooltip + (conf.note ? '<br><br>' + conf.note : '') + '</span>' +
      '</span>';
  }

  function renderResult(rid) {
    var p = PATHWAYS[rid];
    var html = '';

    html += '<div class="card">';
    html += '<span class="result-badge ' + p.badgeClass + '">' + p.badgeIcon + ' ' + p.label + '</span>';
    html += '<div class="result-headline">' + p.headline + '</div>';

    // First action block
    html += '<div class="first-action">' + p.firstAction + '</div>';
    html += '<a href="' + p.callNumber + '" class="btn-primary">' + p.callLabel + '</a>';

    // What to expect
    html += '<div class="section-head">What to expect</div>';
    html += '<div class="what-to-expect">' + p.what_to_expect + '</div>';

    // What to bring
    html += '<div class="section-head">What to bring</div>';
    html += '<ul class="bring-list">';
    p.bring.forEach(function(item) { html += '<li>' + item + '</li>'; });
    html += '</ul>';

    // Additional resources
    html += '<div class="section-head">Additional resources</div>';
    p.resources.forEach(function(r) {
      html += '<div class="resource-card">';
      html += '<div class="resource-card__name">' + r.name + '</div>';
      html += '<a href="' + r.tel + '" class="resource-card__phone">' + r.phone + '</a>';
      if (r.note) html += '<div class="resource-card__note">' + r.note + '</div>';
      html += '</div>';
    });

    // Extra note (optional)
    if (p.extra_note) {
      html += '<div class="extra-note">' + p.extra_note + '</div>';
    }

    // Confidence badge
    html += renderConfidenceBadge(p.confidence);

    html += '</div>'; // end card

    // Restart
    html += '<button class="btn-restart" onclick="goTo(\'welcome\')">← Start over</button>';

    return html;
  }

  function goTo(step) {
    state.step = step;
    render();
    window.scrollTo(0, 0);
  }

  function answer(isYes) {
    var q = QUESTIONS[Q_INDEX[state.step]];
    var next = isYes ? q.next_yes : q.next_no;
    if (next.startsWith('result_')) {
      state.pathway = next;
    }
    goTo(next);
  }

  // Tooltip close on outside click
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.conf-badge')) {
      document.querySelectorAll('.conf-badge.open').forEach(function(el) {
        el.classList.remove('open');
      });
    }
  });

  // Initial render
  render();
</script>
